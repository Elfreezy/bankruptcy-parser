services:
  parser:
    container_name: parser
    build: 
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./app/.env
    volumes:
      - ./src:/code/src
    
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: db
    restart: unless-stopped

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data:
